<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Campus Hub Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(183, 149, 39, 0.16), transparent 34%),
          radial-gradient(circle at bottom right, rgba(3, 86, 66, 0.24), transparent 40%),
          #081018;
        color: #f5f7fa;
      }
      main {
        width: min(760px, calc(100vw - 72px));
        background: rgba(10, 22, 32, 0.84);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 28px;
        padding: 40px;
        box-sizing: border-box;
      }
      h1 { margin: 0 0 16px; font-size: 2.4rem; }
      p { margin: 0 0 14px; line-height: 1.6; color: rgba(245,247,250,0.75); }
      code {
        display: inline-block;
        margin-top: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        color: #f6d67a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Campus Hub is offline</h1>
      <p>The Android TV shell could not reach the configured display URL.</p>
      <p>Use the remote to open setup, then reconfigure the TV or reconnect the device to the network.</p>
      <p><code>Back</code> or <code>Menu</code> opens setup.</p>
    </main>
  </body>
</html>
