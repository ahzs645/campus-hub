name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./campus-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: campus-hub

      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          repository: ahzs645/campus-hub-engine
          path: campus-hub-engine

      - name: Checkout configurator
        uses: actions/checkout@v4
        with:
          repository: ahzs645/campus-hub-configurator
          path: campus-hub-configurator

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: campus-hub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build main site
        run: npm run build:app

      - name: Install docs dependencies
        run: npm ci
        working-directory: ./campus-hub/docs

      - name: Build docs
        run: npm run build
        working-directory: ./campus-hub/docs

      - name: Merge docs into main site
        run: cp -r ./docs/dist ./out/docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./campus-hub/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
